events {
    worker_connections 1024;
}

http {
    # --- INÍCIO DAS CONFIGURAÇÕES GERAIS ---
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    server_tokens off;
    # --- FIM DAS CONFIGURAÇÕES GERAIS ---

    # Define o backend da aplicação Node.js
    upstream editaliza_backend {
        server editaliza-app:3000;
    }

    # Servidor HTTP (Porta 80): Redireciona tudo para HTTPS
    server {
        listen 80;
        server_name editaliza.com.br www.editaliza.com.br;

        # Rota para o desafio do Certbot (necessária para renovações automáticas)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redireciona todo o resto para a versão segura
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # Servidor HTTPS (Porta 443): Onde a mágica acontece
    server {
        listen 443 ssl http2;
        server_name editaliza.com.br www.editaliza.com.br;

        # Caminhos para os certificados SSL gerados pelo Certbot
        # O volume que mapeamos (./ssl:/etc/letsencrypt) torna isso possível
        ssl_certificate /etc/letsencrypt/live/editaliza.com.br/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/editaliza.com.br/privkey.pem;

        # Protocolos e Ciphers de segurança recomendados
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;

        # Cabeçalhos de segurança
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # Rota principal que passa o tráfego para a aplicação Node.js
        location / {
            proxy_pass http://editaliza_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
