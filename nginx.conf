events {
    worker_connections 1024;
}

http {
    # --- CONFIGURAÇÕES GERAIS ---
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    server_tokens off;

    # --- Backend da aplicação ---
    upstream editaliza_backend {
        server editaliza-app:3000;
    }

    # --- Servidor HTTP (Porta 80) ---
    # ÚNICO SERVIDOR ATIVO NESTA CONFIGURAÇÃO TEMPORÁRIA
    # Ele responde ao desafio do Certbot e serve a aplicação sem SSL.
    server {
        listen 80;
        server_name editaliza.com.br www.editaliza.com.br;

        # Rota para o desafio do Certbot (ESSENCIAL)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Todas as outras rotas vão para a aplicação
        location / {
            proxy_pass http://editaliza_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # --- Servidor HTTPS (Porta 443) ---
    # O bloco abaixo está intencionalmente comentado para esta fase.
    # server {
    #     listen 443 ssl http2;
    #     server_name editaliza.com.br www.editaliza.com.br;
    #
    #     ssl_certificate /etc/letsencrypt/live/editaliza.com.br/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/editaliza.com.br/privkey.pem;
    #
    #     location / {
    #         proxy_pass http://editaliza_backend;
    #         proxy_set_header Host $host;
    #         # ... etc ...
    #     }
    # }
}