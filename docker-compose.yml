version: "3.8"

services:
  editaliza-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: editaliza-production
    restart: unless-stopped
    # A porta não precisa ser exposta ao host, o Nginx se comunicará pela rede interna
    # ports:
    #   - "3000:3000" 
    env_file:
      - .env # Carrega as variáveis de ambiente do arquivo .env
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_PATH=/app/data/database.db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # - REDIS_PASSWORD=${REDIS_PASSWORD} # Já carregado pelo env_file
    volumes:
      - editaliza-data:/app/data
      - editaliza-logs:/app/logs
    secrets:
      - session_secret
      - jwt_secret
    networks:
      - editaliza-network
    healthcheck:
      test: ["CMD", "node", "-e", "const http = require('http'); http.get('http://localhost:3000/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1));"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  redis:
    image: redis:7-alpine
    container_name: editaliza-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    env_file:
      - .env # Carrega a senha do Redis
    volumes:
      - redis-data:/data
    networks:
      - editaliza-network
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.1"

  nginx:
    image: nginx:alpine
    container_name: editaliza-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      # Mapeia os certificados SSL gerados pelo Certbot no host para o container
      - ./ssl:/etc/letsencrypt:ro
      # Mapeia a pasta para o desafio do Certbot
      - ./certbot-www:/var/www/certbot
    networks:
      - editaliza-network
    depends_on:
      editaliza-app:
        condition: service_healthy # O Nginx só iniciará APÓS o app estar saudável

volumes:
  editaliza-data:
  editaliza-logs:
  redis-data:

secrets:
  session_secret:
    file: ./secrets/session_secret.txt
  jwt_secret:
    file: ./secrets/jwt_secret.txt

networks:
  editaliza-network:
    driver: bridge
