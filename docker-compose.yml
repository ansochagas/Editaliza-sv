version: "3.8"

services:
  editaliza-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: editaliza-production
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_PATH=/app/data/database.db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - editaliza-data:/app/data
      - editaliza-logs:/app/logs
    secrets:
      - source: session_secret
        target: session_secret
        uid: '1001'
        gid: '1001'
      - source: jwt_secret
        target: jwt_secret
        uid: '1001'
        gid: '1001'
    networks:
      - editaliza-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  redis:
    image: redis:7-alpine
    container_name: editaliza-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    env_file:
      - .env
    volumes:
      - redis-data:/data
    networks:
      - editaliza-network
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.1"

  nginx:
    image: nginx:alpine
    container_name: editaliza-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/letsencrypt:ro
      - ./certbot-www:/var/www/certbot
    networks:
      - editaliza-network
    depends_on:
      - editaliza-app

  certbot:
    image: certbot/certbot
    container_name: editaliza-certbot
    volumes:
      - ./ssl:/etc/letsencrypt
      - ./certbot-www:/var/www/certbot

volumes:
  editaliza-data:
  editaliza-logs:
  redis-data:

secrets:
  session_secret:
    file: ./secrets/session_secret.txt
  jwt_secret:
    file: ./secrets/jwt_secret.txt

networks:
  editaliza-network:
    driver: bridge